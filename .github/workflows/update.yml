name: update fares
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 fetch_fares.py
      - run: |
          git config user.name "fares-bot"
          git config user.email "actions@github.com"
          git add data.json data.js
          git diff --cached --quiet || git commit -m "data: refresh fares"
          git push
